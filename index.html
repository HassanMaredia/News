<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LiveWire News | Real-time headlines</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #1e293b;
      transition: background 0.2s ease;
    }

    /* app container */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
    }

    /* header + branding */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 1rem;
    }
    .logo-area h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .logo-area p {
      font-size: 0.85rem;
      color: #475569;
      margin-top: 4px;
    }
    .badge {
      background: #eef2ff;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1e40af;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.8);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    /* controls row */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .category-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .cat-btn {
      background: white;
      border: 1px solid #cbd5e1;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #334155;
    }
    .cat-btn.active {
      background: #1e3c72;
      border-color: #1e3c72;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .cat-btn:hover:not(.active) {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    .refresh-area {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .refresh-btn {
      background: white;
      border: 1px solid #cbd5e1;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .refresh-btn:hover {
      background: #eef2ff;
    }
    .last-updated {
      font-size: 0.75rem;
      color: #5b6e8c;
      background: #f1f5f9;
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
    }

    /* news grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1.8rem;
      margin-top: 0.5rem;
    }
    .news-card {
      background: white;
      border-radius: 1.2rem;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      border: 1px solid #edf2f7;
    }
    .news-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
    }
    .card-img {
      height: 180px;
      background-color: #eef2ff;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .no-img {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #e2e8f0, #cbd5e1);
      color: #475569;
      font-size: 0.8rem;
    }
    .card-content {
      padding: 1.2rem 1.2rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .source-badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      color: #2c5282;
      background: #e6f0ff;
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      width: fit-content;
      margin-bottom: 0.7rem;
    }
    .news-title {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }
    .news-desc {
      font-size: 0.85rem;
      color: #334155;
      line-height: 1.45;
      margin-bottom: 1.2rem;
      flex: 1;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      font-size: 0.7rem;
      color: #5b6e8c;
      border-top: 1px solid #eef2ff;
      padding-top: 0.8rem;
    }
    .read-link {
      font-weight: 600;
      color: #1e3c72;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }
    .read-link:hover {
      color: #2b6cb0;
      gap: 8px;
    }
    /* loading & error */
    .loader-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 50vh;
      flex-direction: column;
      gap: 1rem;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #1e3c72;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      background: #fee2e2;
      border-left: 5px solid #dc2626;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      margin: 2rem 0;
      color: #991b1b;
    }
    .footer-note {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.75rem;
      color: #6c757d;
      border-top: 1px solid #e2e8f0;
      padding-top: 2rem;
    }
    @media (max-width: 640px) {
      .app-container { padding: 1rem; }
      .news-title { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <div class="header">
    <div class="logo-area">
      <h1>📰 LiveWire News</h1>
      <p>real-time headlines · global pulse</p>
    </div>
    <div class="badge">
      <span class="live-dot"></span>
      <span>LIVE FEED</span>
    </div>
  </div>

  <div class="controls">
    <div class="category-wrapper" id="categoryContainer">
      <!-- categories injected dynamically, but we set static base plus js fill -->
    </div>
    <div class="refresh-area">
      <button class="refresh-btn" id="manualRefreshBtn">⟳ Refresh</button>
      <div class="last-updated" id="timestampLabel">updating...</div>
    </div>
  </div>

  <div id="newsContent">
    <!-- dynamic content: loading, grid or error -->
    <div class="loader-wrapper">
      <div class="spinner"></div>
      <span>Fetching latest headlines...</span>
    </div>
  </div>
  <div class="footer-note">
    🔹 Powered by GNews API | Aggregated live from thousands of sources | Click 'Refresh' for latest
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // 1. CONFIGURATION
  //    FREE API KEY FROM GNews (no credit card, generous free tier)
  //    You can replace with your own key from https://gnews.io/ 
  //    The key below is a demo placeholder that works for limited requests.
  //    For production or heavy usage, please get your own free key.
  // --------------------------------------------------------------
  const API_KEY = "b46d079a8bbdab7c1553651214a3c99f";  // *** REPLACE WITH YOUR VALID GNEWS API KEY ***
  // GNews endpoint: top headlines with category & language=en, country=us (or global)
  // Using 'top-headlines' category param: general, world, business, technology, entertainment, sports, science, health
  const BASE_URL = "https://gnews.io/api/v4/top-headlines";

  // default state
  let currentCategory = "general";
  let isLoading = false;
  let newsArticles = [];

  // categories list for UI
  const categories = [
    { id: "general", label: "🔥 Top Stories" },
    { id: "world", label: "🌍 World" },
    { id: "business", label: "📈 Business" },
    { id: "technology", label: "💻 Tech" },
    { id: "entertainment", label: "🎬 Entertainment" },
    { id: "sports", label: "⚽ Sports" },
    { id: "science", label: "🔬 Science" },
    { id: "health", label: "❤️ Health" }
  ];

  // DOM elements
  const newsContentDiv = document.getElementById("newsContent");
  const categoryContainer = document.getElementById("categoryContainer");
  const manualRefreshBtn = document.getElementById("manualRefreshBtn");
  const timestampLabel = document.getElementById("timestampLabel");

  // Helper: format date relative or time
  function formatUpdatedTime() {
    const now = new Date();
    return `last update: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second:'2-digit' })}`;
  }

  // Show loading skeleton
  function showLoading() {
    newsContentDiv.innerHTML = `
      <div class="loader-wrapper">
        <div class="spinner"></div>
        <span>Loading ${currentCategory} headlines ...</span>
      </div>
    `;
  }

  // Show error message
  function showError(message) {
    newsContentDiv.innerHTML = `
      <div class="error-msg">
        ⚠️ ${message} <br/>
        <small>Please check your API key or network. Using demo? Ensure valid GNews API key.</small>
        <div style="margin-top:12px"><button class="refresh-btn" id="retryBtn">⟳ Retry</button></div>
      </div>
    `;
    const retryBtn = document.getElementById("retryBtn");
    if (retryBtn) retryBtn.addEventListener("click", () => fetchNews(currentCategory));
  }

  // Render news cards
  function renderNews(articles) {
    if (!articles || articles.length === 0) {
      newsContentDiv.innerHTML = `<div class="error-msg">📭 No articles found for "${currentCategory}". Try another category or refresh.</div>`;
      return;
    }

    const gridHTML = `
      <div class="news-grid">
        ${articles.map(article => {
          // image fallback
          let imageUrl = article.image;
          const hasImage = imageUrl && imageUrl !== null && imageUrl !== "";
          const imageStyle = hasImage 
            ? `background-image: url('${imageUrl}'); background-size: cover;` 
            : `background: linear-gradient(135deg, #cbd5e1, #94a3b8); display: flex; align-items: center; justify-content: center; content: '📷';`;
          
          // description fallback
          const description = article.description || article.title || "Read more about this breaking story on the source website.";
          const title = article.title || "Untitled story";
          const sourceName = article.source?.name || "News Source";
          const url = article.url || "#";
          const publishedAt = article.publishedAt ? new Date(article.publishedAt).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }) : "recent";

          return `
            <div class="news-card">
              <div class="card-img ${!hasImage ? 'no-img' : ''}" style="${imageStyle}">
                ${!hasImage ? '<span style="font-size: 2rem;">📰</span>' : ''}
              </div>
              <div class="card-content">
                <div class="source-badge">${escapeHtml(sourceName)}</div>
                <div class="news-title">${escapeHtml(title)}</div>
                <div class="news-desc">${escapeHtml(description.length > 140 ? description.substring(0, 140) + '…' : description)}</div>
                <div class="meta-row">
                  <span>🕒 ${publishedAt}</span>
                  <a class="read-link" href="${url}" target="_blank" rel="noopener noreferrer">Full story →</a>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    newsContentDiv.innerHTML = gridHTML;
  }

  // simple escape to avoid XSS
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // fetch news using GNews API
  async function fetchNews(category) {
    if (isLoading) return;
    isLoading = true;
    currentCategory = category;
    showLoading();
    updateActiveCategoryButton(category);

    try {
      // Build URL: top-headlines?category=general&lang=en&country=us&max=20&apikey=XXX
      // using country=us, india, or global? GNews works with country & lang.
      // We'll use lang=en and country=us for stable top stories; for world we can use country=us but category world gives intl.
      let url = `${BASE_URL}?category=${category}&lang=en&country=us&max=20&apikey=${API_KEY}`;
      // special: 'world' category is directly supported by GNews API (category=world)
      // optional: if we want global mix for world, the category "world" works fine.
      const response = await fetch(url);
      
      if (!response.ok) {
        let errorDetail = `API responded with status ${response.status}`;
        if (response.status === 401 || response.status === 403) errorDetail = "Invalid or missing API key. Please get a free key from gnews.io and replace API_KEY in the code.";
        else if (response.status === 429) errorDetail = "Rate limit exceeded. Please wait and refresh later.";
        throw new Error(errorDetail);
      }
      
      const data = await response.json();
      if (data && data.articles) {
        newsArticles = data.articles.slice(0, 20); // max 20 fresh
        renderNews(newsArticles);
        timestampLabel.innerText = formatUpdatedTime();
      } else if (data.errors) {
        throw new Error(data.errors[0]?.message || "Unknown API error");
      } else {
        throw new Error("Unexpected response format from news API");
      }
    } catch (err) {
      console.error("Fetch error:", err);
      let friendlyMsg = err.message;
      if (friendlyMsg.includes("API key") || friendlyMsg.includes("403") || friendlyMsg.includes("401")) {
        friendlyMsg = "🔑 API Key issue: Please replace the demo key with a valid GNews API key (free from gnews.io).";
      } else {
        friendlyMsg = `⚠️ Failed to load news: ${err.message}. Check network or try again.`;
      }
      showError(friendlyMsg);
      timestampLabel.innerText = "update failed";
    } finally {
      isLoading = false;
    }
  }

  // update UI active category
  function updateActiveCategoryButton(activeId) {
    const btns = document.querySelectorAll(".cat-btn");
    btns.forEach(btn => {
      if (btn.dataset.cat === activeId) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
  }

  // build category buttons and attach events
  function buildCategoryButtons() {
    categoryContainer.innerHTML = "";
    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = `cat-btn ${currentCategory === cat.id ? 'active' : ''}`;
      btn.dataset.cat = cat.id;
      btn.innerText = cat.label;
      btn.addEventListener("click", () => {
        if (isLoading) return;
        if (currentCategory === cat.id) return;
        fetchNews(cat.id);
      });
      categoryContainer.appendChild(btn);
    });
  }

  // auto refresh with "Refresh" button: re-fetch current category
  function setupRefreshButton() {
    manualRefreshBtn.addEventListener("click", () => {
      if (isLoading) return;
      fetchNews(currentCategory);
    });
  }

  // initial load and optional fallback key warning
  function init() {
    buildCategoryButtons();
    setupRefreshButton();
    // warn user about API key placeholder (but still try with placeholder)
    if (API_KEY === "5b03ba5a29d75b3330543f729bd7cc0b") {
      console.warn("⚠️ Live News: Using demo API key placeholder. For full functionality, replace with your GNews API key (free).");
      // Show subtle note on UI but not blocking: a small tooltip in console, but we can show soft banner
      const footer = document.querySelector(".footer-note");
      if (footer) {
        const note = document.createElement("div");
        note.style.marginTop = "8px";
        note.style.fontSize = "0.7rem";
        note.style.color = "#b91c1c";
        note.innerHTML = "ℹ️ Demo API key may have limited requests. Replace with your own GNews API key for stable usage.";
        footer.prepend(note);
      }
    }
    // initial fetch
    fetchNews("general");
  }

  // start the app
  init();
</script>
</body>
</html>
